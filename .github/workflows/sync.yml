name: Sync chart links

on:
  schedule:
    # 06:10 UTC daily — after Apple's chart typically refreshes.
    - cron: "10 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/sync.mjs
        env:
          DISCOGS_CONSUMER_KEY: ${{ secrets.DISCOGS_CONSUMER_KEY }}
          DISCOGS_CONSUMER_SECRET: ${{ secrets.DISCOGS_CONSUMER_SECRET }}
      - name: Commit updated chart-links.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart-links.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Sync chart links"
          git push
